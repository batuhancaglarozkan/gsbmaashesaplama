<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSB Maaş Hesaplama Robotu | 10 Nolu İşkolu</title>
<meta name="description" content="GSB 10 Nolu İşkolu Koop-İş Sendikası Güncel Maaş Hesaplama Robotu. 2026 TİS ve vergi dilimi uyumlu.">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
/* SENİN ESKİ STİLLERİN (HİÇBİRİNİ SİLMEDİM) */
:root {
  --bg-color: linear-gradient(135deg,#e6f5ec,#ffffff);
  --box-bg: #ffffff;
  --text-color: #333;
  --border-color: #e1eee7;
  --input-border: #dce8e1;
  --label-color: #444;
}

/* --- YENİ EKLENEN DUYURU EKRANI --- */
#duyuru-ekrani {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, #1f7a4f 0%, #0d3b25 100%);
  color: white; display: flex; flex-direction: column; justify-content: center; align-items: center;
  text-align: center; z-index: 10000; transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
  padding: 20px; box-sizing: border-box;
}
.logo-container { display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 30px; }
.tis-logo { height: 80px; width: auto; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
.tis-baslik { font-size: 2rem; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
.tis-detay { font-size: 1.3rem; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 30px; }
.tis-detay b { color: #ffd700; }
.git-btn { background: #ffffff; color: #1f7a4f; padding: 15px 30px; border-radius: 50px; font-size: 1.1rem; font-weight: 800; border: none; cursor: pointer; transition: 0.3s; }

/* --- TİS GERİ SAYIM BUTONU --- */
.tis-countdown-btn {
  position: absolute; right: 0; background: #ffc107; color: #333; padding: 8px 15px; border-radius: 12px;
  font-size: 12px; font-weight: bold; display: flex; flex-direction: column; align-items: center;
  box-shadow: 0 4px 8px rgba(0,0,0,0.15); line-height: 1.2; min-width: 120px; border: 2px solid #ff9800;
}

/* WHATSAPP PAYLAŞ BUTONU */
.whatsapp-btn {
  background: #25D366; color: white; padding: 15px; border-radius: 15px; text-decoration: none;
  display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold;
  margin-top: 20px; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
}

/* SENİN DİĞER TÜM STİLLERİN AŞAĞIDA DEVAM EDİYOR... */
body{ font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-color); padding:15px; color: var(--text-color); margin: 0; }
.header-container { text-align: center; margin-bottom: 25px; position: relative; }
h1{ color:#1f7a4f; margin-bottom: 5px; font-weight: 800; font-size: 22px;}
.version-badge { background: #1f7a4f; color: white; font-size: 10px; padding: 3px 10px; border-radius: 50px; font-weight: bold; display: inline-block; }
.social-bar-wrapper { display: flex; justify-content: center; align-items: center; margin-top: 15px; position: relative; min-height: 50px; }
.social-icons { display: flex; gap: 10px; }
.social-icons a { text-decoration: none; font-size: 18px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--box-bg); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

.box{ background: var(--box-bg); padding:20px; border-radius:24px; box-shadow:0 15px 40px rgba(0,0,0,0.08); max-width:850px; margin:auto; border: 1px solid var(--border-color); }
.section-title { background: #1f7a4f; color: white; padding: 12px 18px; border-radius: 10px; margin-top: 25px; margin-bottom: 12px; font-size: 14px; font-weight: bold; text-transform: uppercase; }
.grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
label{display:block; margin-top:8px; font-weight:700; font-size: 12px; color: var(--label-color);}
.sub-label { font-size: 10px; color: #777; font-weight: 500; display: block; margin-top: 2px; }
.info-note { grid-column: 1 / -1; background: rgba(31, 122, 79, 0.05); border-left: 3px solid #1f7a4f; padding: 10px 14px; font-size: 11px; color: #1f7a4f; font-weight: 600; margin-top: 8px; border-radius: 4px; }
select,input{ width:100%; padding:10px; border-radius:10px; border:1.5px solid var(--input-border); margin-top:4px; box-sizing: border-box; font-size: 14px; }
.toggle-btn { background: #e1eee7; color: #1f7a4f; border: 2px solid #1f7a4f; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; }
.toggle-btn.active { background: #1f7a4f; color: white; }
.net-tutar-card { background: linear-gradient(135deg, #1f7a4f 0%, #0d3b25 100%); margin-top: 30px; padding: 40px 20px; border-radius: 30px; text-align: center; color: white; }
.net-tutar-rakam { font-size: 48px; font-weight: 900; }
button.ana-btn{ margin-top:20px; padding:15px; width:100%; background:#1f7a4f; color:#fff; border:none; border-radius:15px; cursor:pointer; font-weight: bold; font-size: 15px; }
.receipt-container { background: #fff; color: #333; padding: 25px; border-radius: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 20px; font-family: 'Courier New', monospace; border-top: 8px solid #1f7a4f; }
.receipt-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; font-weight: bold; border-bottom: 1px dotted #eee; }
.footer-note { text-align: center; font-size: 11px; color: #888; margin-top: 20px; }

@media (max-width: 768px) { 
  .tis-baslik { font-size: 1.4rem; }
  .grid-container { grid-template-columns: 1fr !important; }
  .social-bar-wrapper { flex-direction: column; gap: 15px; } 
  .tis-countdown-btn { position: static; width: 100%; }
}
</style>
</head>
<body>

<div id="duyuru-ekrani">
    <div class="logo-container">
        <img src="logo1.png" alt="Logo 1" class="tis-logo">
        <img src="logo2.png" alt="Logo 2" class="tis-logo">
    </div>
    <div class="tis-baslik">GSB 10 NOLU İŞ KOLU TİS TOPLANTISI</div>
    <div class="tis-detay"><b>30 MART 2026 SAAT 14:00</b><br>TÜHİS GENEL MERKEZİ</div>
    <button class="git-btn" onclick="sayfayaGit()">Programa Giriş Yap</button>
</div>

<div id="giris" class="box" style="margin-top: 40px;">
  <div class="header-container">
    <h1>Maaş Hesaplama Robotu (GSB)</h1>
    <span class="version-badge">v1.5 | 28 Şubat 2026 GÜNCEL</span>
    <div class="social-bar-wrapper">
        <div class="social-icons">
          <a href="http://instagram.com/batuhancaglarozkan" target="_blank" class="ins"><i class="fab fa-instagram"></i></a>
          <a href="https://x.com/BatuhanOzkann" target="_blank" class="twi"><i class="fab fa-x-twitter"></i></a>
        </div>
        <div class="tis-countdown-btn">
          <span>TİS TOPLANTISINA</span>
          <span class="tis-timer" id="tis-counter">Yükleniyor...</span>
        </div>
    </div>
  </div>
  <label>Şifre</label>
  <input type="password" id="sifre" placeholder="gsbkoopis">
  <button class="ana-btn" onclick="kontrol()">GİRİŞ YAP</button>
</div>

<div id="icerik" style="display:none">
    <div class="box">
        <div class="section-title">1. BÖLÜM: Temel Bilgiler</div>
        <div class="grid-container">
            </div>

        <button class="ana-btn" onclick="hesapla()">HESAPLA</button>

        <a href="https://api.whatsapp.com/send?text=GSB%20Maa%C5%9F%20Hesaplama%20Robotu%20güncellendi!%20Buradan%20hesaplayabilirsin:%20https://seninlinkin.github.io" target="_blank" class="whatsapp-btn">
            <i class="fab fa-whatsapp"></i> WhatsApp'ta Arkadaşınla Paylaş
        </a>

        <div class="net-tutar-card" id="sonucAlani" style="display:none;">
          <div class="net-tutar-rakam" id="toplamNet">0.00 TL</div>
        </div>
        
        <div id="sonuc" style="display:none"></div>
    </div>
</div>

<script>
// --- SENİN ORİJİNAL JS FONKSİYONLARININ TAMAMI BURAYA ---
// (donemGuncelle, yogurtOtomatikGuncelle, hesapla, tabloCiz, detayGoster vb.)

function sayfayaGit() { document.getElementById('duyuru-ekrani').style.transform = 'translateY(-100%)'; }

function kontrol() {
  if(document.getElementById("sifre").value==="gsbkoopis"){
    document.getElementById("giris").style.display="none";
    document.getElementById("icerik").style.display="block";
  }else{ alert("Şifre Yanlış!"); }
}

// TİS GERİ SAYIM MANTIĞI
const countDownDate = new Date("Mar 30, 2026 14:00:00").getTime();
setInterval(function() {
  const now = new Date().getTime();
  const distance = countDownDate - now;
  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);
  document.getElementById("tis-counter").innerHTML = days + "g " + hours + "s " + minutes + "d " + seconds + "s";
}, 1000);

// --- BURADAN AŞAĞISINA KENDİ ESKİ HESAPLAMA FONKSİYONLARINI EKLE ---
</script>
</body>
</html>
